# --- empty fetch ---

- name: fetch on empty result set
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def t_empty() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              cur.execute("SELECT 1 WHERE false")
              if cur.fetchone() is not None:
                  return "fetchone should return None"
              if cur.fetchmany(10) != []:
                  return "fetchmany should return []"
              if cur.fetchall() != []:
                  return "fetchall should return []"
              if cur.rowcount != 0:
                  return f"rowcount {cur.rowcount}"
          return "ok"
  - query: select t_empty() as r
    results:
      - r: 'ok'

# --- error classification ---

- name: integrity error has pgcode
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def t_integrity() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              cur.execute("CREATE TEMP TABLE t_uq (id int PRIMARY KEY)")
              cur.execute("INSERT INTO t_uq VALUES (1)")
              try:
                  cur.execute("INSERT INTO t_uq VALUES (1)")
                  return "no exception raised"
              except dbapi.IntegrityError as e:
                  if e.pgcode != "23505":
                      return f"pgcode {e.pgcode}"
                  return "ok"
              except Exception as e:
                  return f"wrong type: {type(e).__name__}: {e}"
  - query: select t_integrity() as r
    results:
      - r: 'ok'

- name: programming error on syntax
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def t_syntax() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              try:
                  cur.execute("SELEC nope")
                  return "no exception raised"
              except dbapi.ProgrammingError as e:
                  if not (e.pgcode or "").startswith("42"):
                      return f"pgcode {e.pgcode}"
                  return "ok"
              except Exception as e:
                  return f"wrong type: {type(e).__name__}"
  - query: select t_syntax() as r
    results:
      - r: 'ok'

