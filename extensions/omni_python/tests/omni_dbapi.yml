- name: date and time round-trip
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi
      from datetime import date, time, datetime

      @pg
      def rt_datetimes() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              d = date(2024, 1, 15)
              cur.execute("SELECT %s::date", [d])
              got = cur.fetchone()[0]
              if got != d:
                  return f"date: got {got!r} ({type(got).__name__})"
              t = time(14, 30, 45)
              cur.execute("SELECT %s::time", [t])
              got = cur.fetchone()[0]
              if got != t:
                  return f"time: got {got!r} ({type(got).__name__})"
              ts = datetime(2024, 1, 15, 14, 30, 45)
              cur.execute("SELECT %s::timestamp", [ts])
              got = cur.fetchone()[0]
              if got != ts:
                  return f"timestamp: got {got!r} ({type(got).__name__})"
          return "ok"
  - query: select rt_datetimes() as r
    results:
      - r: 'ok'

