# --- type round-trips ---

- name: int round-trip
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def rt_int() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              for v in (0, 1, -1, 32767, -32768, 2147483647, -2147483648, 9223372036854775807):
                  cur.execute("SELECT %s::bigint", [v])
                  r = cur.fetchone()
                  if r[0] != v:
                      return f"int {v}: got {r[0]!r}"
          return "ok"
  - query: select rt_int() as r
    results:
      - r: 'ok'

