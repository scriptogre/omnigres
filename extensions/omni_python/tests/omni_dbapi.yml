# --- context manager: rollback on exception ---

- name: context manager rolls back on exception
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def t_ctx_rollback() -> str:
          conn = dbapi.connect()
          conn.autocommit = False
          cur = conn.cursor()
          cur.execute("CREATE TABLE IF NOT EXISTS t_ctx_rb (v int)")
          cur.execute("DELETE FROM t_ctx_rb")
          conn.commit()
          try:
              with conn:
                  with conn.cursor() as cur2:
                      cur2.execute("INSERT INTO t_ctx_rb VALUES (1)")
                      raise ValueError("boom")
          except ValueError:
              pass
          cur.execute("SELECT count(*) FROM t_ctx_rb")
          n = cur.fetchone()[0]
          conn.close()
          if n != 0:
              return f"rollback failed, count={n}"
          return "ok"
  - query: select t_ctx_rollback() as r
    results:
      - r: 'ok'
