# --- existing autocommit + write-path scenarios ---

- name: autocommit
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def insert_employee_no_autocommit(name: str, deparment: str, salary: int) -> str:
          conn = dbapi.connect()
          conn.autocommit = False
          cur = conn.cursor()
          try:
              cur.execute("INSERT INTO employees (name, department, salary) VALUES ($1, $2, $3)", [name, deparment, salary])
          except:
              conn.rollback()
              return "Failed"
          conn.commit()
          cur.close()
          conn.close()
          return "Success"
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def insert_employee_autocommit(name: str, deparment: str, salary: int) -> str:
          conn = dbapi.connect()
          conn.autocommit = True
          cur = conn.cursor()
          try:
              cur.execute("INSERT INTO employees (name, department, salary) VALUES ($1, $2, $3)", [name, deparment, salary])
          except:
              conn.rollback()
              return "Failed"
          cur.close()
          conn.close()
          return "Success"
  - query: select insert_employee_no_autocommit('Bill', 'Accounting', 80) as res
    results:
      - res: 'Success'
  - query: select insert_employee_autocommit('Tony', 'Marketing', 60) as res
    results:
      - res: 'Success'
  - query: select * from employees
    results:
      - id: 1
        name: 'Bill'
        department: 'Accounting'
        salary: 80
      - id: 2
        name: 'Tony'
        department: 'Marketing'
        salary: 60

# --- INSERT/UPDATE/DELETE with RETURNING ---

- name: insert returning
  steps:
  - query: select * from omni_python.create_functions($1)
    params:
    #language=Python
    - |
      from omni_python import pg, dbapi

      @pg
      def t_returning() -> str:
          with dbapi.connect() as c, c.cursor() as cur:
              cur.execute("CREATE TEMP TABLE t_ret (id serial PRIMARY KEY, v text)")
              cur.execute("INSERT INTO t_ret (v) VALUES (%s) RETURNING id, v", ["hello"])
              r = cur.fetchone()
              if r[0] != 1 or r[1] != "hello":
                  return f"got {r!r}"
              if cur.rowcount != 1:
                  return f"rowcount {cur.rowcount}"
          return "ok"
  - query: select t_returning() as r
    results:
      - r: 'ok'

