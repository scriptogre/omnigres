# "Make it fast / in-memory" Postgres config used for the optimized runs.
# Append to postgresql.conf (it wins over ALTER SYSTEM, which the omnigres
# image pins shared_buffers in). Container must be started with --shm-size>=2g
# because the default /dev/shm (64MB) caps shared_buffers.
#
# Durability tiers (pick per experiment):
#   max throughput, NOT durable : fsync=off + synchronous_commit=off (+ UNLOGGED tables)
#   relaxed durability          : fsync=on  + synchronous_commit=off   (lose <=200ms on crash)
#   full durability + fast      : fsync=on  + synchronous_commit=on  + commit_delay (group commit)

shared_buffers = 2GB                  # cache the entire ~750MB dataset in RAM
work_mem = 64MB
maintenance_work_mem = 512MB
wal_buffers = 64MB
wal_level = minimal                   # no replication overhead
max_wal_senders = 0
checkpoint_timeout = 30min            # avoid checkpoint storms mid-run
max_wal_size = 8GB
checkpoint_completion_target = 0.9
autovacuum = off                      # no background vacuum perturbation

# --- durability knobs (set per tier above) ---
synchronous_commit = off
fsync = off
full_page_writes = off
# group commit (use with synchronous_commit=on for durable + fast):
commit_delay = 150
commit_siblings = 5
