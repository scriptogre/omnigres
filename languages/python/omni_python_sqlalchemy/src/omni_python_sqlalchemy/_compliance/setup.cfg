# Generated by Claude at omni_python_dbapi. Verify against code. May be stale.
# Standard third-party dialect test wiring. See SA's README.dialects.rst.

[tool:pytest]
addopts = --tb=short -p no:cacheprovider -p no:warnings
python_files = test_*.py
python_classes = *Test
python_functions = test_*

[sqla_testing]
requirement_cls = omni_python_sqlalchemy._compliance.requirements:Requirements
# Required by SA's pytestplugin._setup_profiling. We never read it back, but
# it must exist; we point at /tmp so any write goes to a tmpfs.
profile_file = /tmp/sa_compliance_profiles.txt

[db]
default = postgresql+omni_python://
